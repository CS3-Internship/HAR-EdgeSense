name: Build & Release Android APK

# Push a version tag (e.g. `git tag v1.0.0 && git push origin v1.0.0`) to build
# the Flutter app and publish the APK as a downloadable GitHub Release asset.
# Can also be run manually from the Actions tab without a tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Build release APK
        run: flutter build apk --release

      - name: Rename APK for the release
        run: cp build/app/outputs/flutter-apk/app-release.apk "EdgeSense-${{ github.ref_name }}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: frontend/EdgeSense-${{ github.ref_name }}.apk
          generate_release_notes: true
